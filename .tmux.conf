# List of plugins
#set -g @plugin 'tmux-plugins/tpm'
#set -g @plugin 'tmux-plugins/tmux-resurrect'
#
#set -g @resurrect-strategy-nvim 'session'

# setting prefix key as alt+e
unbind C-b
set-option -g prefix M-e
bind-key M-e send-prefix

set -g default-terminal "tmux-256color"
set-option -g focus-events on
set-option -sa terminal-overrides ',xterm-256color:RGB'

setw -g mode-keys vi
# Setup 'v' to begin selection as in Vim
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -in -selection clipboard"

# Move the current window to the right and select the new position
bind-key L swap-window -t +1 \; select-window -t +1
# Move the current window to the left and select the new position
bind-key H swap-window -t -1 \; select-window -t -1

# Prompt for a window index to turn it into a pane in the current window
# Intelligent join-pane: call the external script to decide on split orientation
bind-key j command-prompt -p "Join window as pane (index):" "run-shell '~/.tmux_handle_pane_intelligently.sh join %%'"

# Break all panes in the current window out into their own windows
bind-key J run-shell "~/.tmux_break_other_panes.sh"

# Split panes intelligently
bind-key s run-shell '~/.tmux_handle_pane_intelligently.sh split'

# Break the current pane out of the window
bind-key b break-pane

# Reload the tmux configuration file
bind-key r source-file ~/.tmux.conf \; display-message "Config reloaded"

set -g status-keys emacs

# Address vim mode switching delay (http://superuser.com/a/252717/65504)
set -s escape-time 10

# Increase scrollback buffer size from 2000 to 50000 lines
set -g history-limit 50000

# Increase tmux messages display duration from 750ms to 4s
set -g display-time 4000

# Start from current path
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
# run '~/.tmux/plugins/tpm/tpm'
